<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>行き先表示機シミュレータ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:site_name" content="行き先表示機シミュレータ">
  <meta property="og:title" content="行き先表示機シミュレータ">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ikkunn700s.github.io/train-led/">
  <meta name="description" content="水上イリスが開発した、在来線や新幹線のリアルなフルカラーLED行き先表示機（方向幕）を作成・シミュレートできるWebアプリです。本物さながらのドット表示や、作成した画像のダウンロード保存にも対応しています。">
  <meta property="og:description" content="水上イリスが開発した、在来線や新幹線のリアルなフルカラーLED行き先表示機（方向幕）を作成・シミュレートできるWebアプリです。本物さながらのドット表示や、作成した画像のダウンロード保存にも対応しています。">

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "行き先表示機シミュレータ",
      "url": "https://ikkunn700s.github.io/train-led/"
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@430&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="icon" href="images/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="256x256" href="images/favicon/android-chrome-256x256.png">
</head>
<body>
  <h1 class="title" style="color: white;">行き先表示機シミュレータ</h1>

  <div class="display-frame">
    <div class="led-display">
      <div class="car-number" id="car-number">
        <div class="car-digit" id="car-digit">1</div>
        <div class="car-label">号車</div>
      </div>
      <div class="type-area" id="type-area"><span id="rounded-box"><span id="type-text">普通</span></span></div>
      <div class="destination-area" id="destination-area"><span id="destination-text">名古屋</span></div>
      <canvas id="dot-canvas" data-html2canvas-ignore="true"></canvas>
    </div>
  </div>

  <div class="controls">
    <div class="section">
      <label>号車:
        <input type="number" id="car-input" value="1" min="1" style="width: 4em;">
      </label>
    </div>

    <div class="section">
      <label>種別:
        <select id="type-select"></select>
        <button id="open-settings-btn" style="margin-top: 10px; cursor: pointer;">⚙️ 種別設定</button>
      </label>
    </div>

    <div class="section">
      <label>行先 (日本語):
        <input type="text" id="destination-input" value="名古屋" />
      </label>

      <label>行先 (英語):
        <input type="text" id="romaji-input" value="Nagoya" />
      </label>
    </div>

    <div id="settings-modal">
        <div class="modal">
            <h2 style="margin-top: 0;">種別・カラー設定</h2>
            
            <div class="preset">
                <label>プリセット: </label>
                <select id="preset-select"></select>
                <button id="load-preset-btn">読み込み</button>
            </div>
            <hr>
            <div id="type-editor-container"></div>
            <div style="margin-bottom: 20px; text-align: right;">
                <button id="close-settings-btn" style="margin-right: 10px;">ｷｬﾝｾﾙ</button>
                <button id="save-settings-btn">適用</button>
            </div>
        </div>
    </div>

    <div class="toggle-container">
      <div class="toggle-item">
        <label for="toggle-dots">ドット表示
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-dots">
          </label>
        </label>
      </div>

      <div class="toggle-item">
        <label class="auto-switch-toggle" for="auto-switch-toggle">自動切替（日本語/英語）
          <label class="toggle-switch">
            <input type="checkbox" id="auto-switch-toggle" checked>
          </label>
        </label>
      </div>
    </div>
  </div>

  

  <script src="./js/script.js"></script>

  <button id="save-image-button">画像として保存</button>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <div style="margin-top: 15px; text-align: center;">
    <a href="bilingual.html" style="color: #00aadd;">日英並列表示版へ →</a>
  </div>

  <a href="shinkansen.html" class="a">新幹線の行き先表示シミュレータへ</a>

  <footer>
    <p>&copy; 2026 ikkunN700S</p>
    <p id="site-version"></p>
    <script src="./js/version.js"></script>
  </footer>
</body>
</html>
