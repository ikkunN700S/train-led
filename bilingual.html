<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行き先表示機シミュレータ（日英表示）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/bilingual.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="icon" href="images/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="256x256" href="images/favicon/android-chrome-256x256.png">
</head>
<body>
    <h1 class="title" style="color: white;">行き先表示機シミュレータ</h1>

    <div class="simulator-container">
        <!-- LED表示器本体 -->
        <div class="display-frame">
            <div class="led-display" id="led-display">
                <!-- 種別エリア -->
                <div id="type-area" class="type-area">
                    <div id="type-text-ja" class="main-text"></div>
                    <div id="type-text-en" class="sub-text"></div>
                </div>

                <!-- 行先エリア -->
                <div id="destination-area" class="destination-area">
                    <div id="destination-text-ja" class="main-text"></div>
                    <div id="destination-text-en" class="sub-text"></div>
                </div>
            </div>
            <!-- ドット描画用キャンバス -->
            <canvas id="dot-canvas"></canvas>
        </div>

        <!-- 操作パネル -->
        <div class="controls">
            <div class="section">
                <div class="control-group" >
                    <label>種別:
                        <select id="type-select"></select>
                        <button id="open-settings-btn" class="settings-btn" style="margin-top: 10px; cursor: pointer;">⚙️ 種別設定</button>
                    </label>
                </div>
            </div>
            
            <div class="section">
                <div class="control-group">
                    <label>行先 (日本語):
                        <input type="text" id="destination-input" value="名古屋">
                    </label>
                </div>
                <div class="control-group">
                    <label>行先 (英語):
                        <input type="text" id="romaji-input" value="Nagoya">
                    </label>
                </div>
            </div>

            <div class="section">
                <div class="control-group switch-group" style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <label class="toggle-wrapper">
                        <span class="toggle-text">行先枠を表示 (特殊種別時)</span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="toggle-dest-btn">
                        </div>
                    </label>
                    <!--
                    <label class="toggle-wrapper">
                        <div class="toggle-switch">
                            <input type="checkbox" id="toggle-dots">
                        </div>
                        <span class="toggle-text">リアルLEDドット表示</span>
                    </label>
                    -->
                </div>
            </div>

            <div id="settings-modal">
                <div class="modal">
                    <h2 style="margin-top: 0;">種別・カラー設定</h2>

                    <div class="preset">
                        <label style="width: auto;">プリセット:</label>
                        <select id="preset-select"></select>
                        <button id="load-preset-btn">読み込み</button>    
                    </div>
                    <hr>
                    <div id="type-editor-container"></div>
                    <div style="margin-bottom: 20px; text-align: right;">
                        <button id="close-settings-btn" style="margin-right: 10px;">ｷｬﾝｾﾙ</button>
                        <button id="save-settings-btn" class="save-btn">適用</button>
                    </div>
                </div>
            </div>
        </div>

        <button id="save-image-button" class="save-btn">画像を保存</button>
        <div style="margin-top: 15px; text-align: center; font-family: 'DotGothic16';">
            <a href="index.html" style="color: #00aadd;">← 通常モード（切替式）に戻る</a>
        </div>
    </div>

    <script src="./js/bilingual.js"></script>

    <footer>
      <p>&copy; 2026 ikkunN700S</p>
      <p id="site-version"></p>
      <script src="./js/version.js"></script>
    </footer>
</body>
</html>
